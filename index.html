<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Skye — Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="weather.css">
</head>
<body>

  <!-- Sky -->
  <div class="sky" id="sky">
    <div class="stars" id="stars"></div>
    <div class="shooting-stars" id="shootingStars"></div>
    <div class="ufo-layer" id="ufoLayer"></div>
    <div class="clouds">
      <div class="cloud c1"></div>
      <div class="cloud c2"></div>
      <div class="cloud c3"></div>
    </div>
  </div>

  <!-- Celestial -->
  <div class="celestial" id="celestial">
    <div class="celestial-body">
      <div class="rays" id="rays">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
      <div class="craters" id="craters">
        <div class="crater cr1"></div>
        <div class="crater cr2"></div>
        <div class="crater cr3"></div>
      </div>
      <div class="core"></div>
    </div>
  </div>

  <div class="ground-glow" id="groundGlow"></div>

  <!-- App -->
  <div class="app-wrapper">
    <div class="app-card" id="appCard">

      <div class="app-header">
        <span class="brand">SKYE</span>
        <div class="header-right">
          <!-- Sun / Moon toggle -->
          <button class="mode-toggle" id="modeToggle" title="Toggle Day / Night">
            <span class="toggle-track">
              <span class="toggle-icon sun-icon">☀️</span>
              <span class="toggle-icon moon-icon">🌙</span>
              <span class="toggle-thumb"></span>
            </span>
          </button>
          <span class="time-badge" id="timeBadge">—</span>
        </div>
      </div>

      <div class="search-row">
        <div class="input-wrap">
          <svg class="pin-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
          <input type="text" id="city" placeholder="Search city…" autocomplete="off" spellcheck="false">
        </div>
        <button id="searchbtn" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>

      <div id="result" class="result-area"></div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
